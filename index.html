<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DISC Veteranas · Peña Recreativa Sant Feliu</title>
<style>
:root{
  --d:#E24B4A;--dl:#FCEBEB;--dm:#F09595;
  --i:#EF9F27;--il:#FAEEDA;--im:#FAC775;
  --s:#1D9E75;--sl:#E1F5EE;--sm:#9FE1CB;
  --c:#378ADD;--cl:#E6F1FB;--cm:#85B7EB;
  --bg:#ffffff;--bg2:#f5f5f7;--border:#e5e5e7;--border2:#d1d1d6;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --radius:14px;--radius-sm:10px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f0f5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:1rem;}
#app{width:100%;max-width:420px;background:var(--bg);border-radius:20px;padding:1.25rem;min-height:600px;display:flex;flex-direction:column;box-shadow:0 4px 32px rgba(0,0,0,.10);}
.screen{display:none;flex-direction:column;flex:1;}
.screen.active{display:flex;}

/* WELCOME */
.welcome-hero{text-align:center;padding:1rem 0;}
.club-badge{font-size:48px;margin-bottom:.75rem;}
.disc-logo{display:flex;gap:6px;justify-content:center;margin-bottom:1rem;}
.dl{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;}
.dl.d{background:var(--dl);color:var(--d);border:1px solid var(--dm);}
.dl.i{background:var(--il);color:var(--i);border:1px solid var(--im);}
.dl.s{background:var(--sl);color:var(--s);border:1px solid var(--sm);}
.dl.c{background:var(--cl);color:var(--c);border:1px solid var(--cm);}
.welcome-title{font-size:20px;font-weight:600;margin-bottom:4px;color:var(--text);}
.welcome-club{font-size:12px;color:var(--text2);margin-bottom:10px;}
.welcome-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1.25rem;}
.info-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.ic{background:var(--bg2);border-radius:var(--radius-sm);padding:11px;text-align:center;}
.ic .n{font-size:19px;font-weight:600;color:var(--text);}
.ic .l{font-size:11px;color:var(--text2);margin-top:2px;}
.btn-g{width:100%;padding:13px;background:var(--s);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:8px;}
.btn-g:hover{opacity:.85;}
.btn-sec{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s;}
.btn-sec:hover{background:var(--border);}

/* SETUP */
.sec-title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text);}
.sec-sub{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.player-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem;max-height:340px;overflow-y:auto;}
.player-row{display:flex;gap:8px;align-items:center;}
.player-num{width:22px;font-size:12px;color:var(--text3);text-align:center;flex-shrink:0;}
.player-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);}
.player-input:focus{outline:none;border-color:var(--s);}
.btn-del{width:32px;height:32px;border:none;background:var(--dl);color:var(--d);border-radius:8px;cursor:pointer;font-size:15px;flex-shrink:0;}
.btn-add-p{padding:8px 14px;background:var(--sl);color:var(--s);border:1px solid var(--sm);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1rem;width:100%;}

/* QUIZ */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .3s ease;}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;}
.quiz-counter{font-size:13px;color:var(--text2);}
.badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;}
.qcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:1rem;}
.qemoji{font-size:20px;margin-bottom:7px;}
.qtext{font-size:14px;font-weight:500;color:var(--text);line-height:1.55;}
.opts-lbl{font-size:12px;color:var(--text2);margin-bottom:9px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.obt{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:left;cursor:pointer;transition:all .15s;}
.obt:hover{background:var(--bg2);}
.obt.sel{border-width:2px;}
.obt .ot{font-size:13px;color:var(--text);line-height:1.4;}
.nav-row{display:flex;gap:8px;margin-top:auto;padding-top:1rem;}
.btn-back{flex:0 0 44px;height:44px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:18px;color:var(--text);}
.btn-next{flex:1;height:44px;background:var(--s);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}
.btn-next:not(:disabled):hover{opacity:.85;}

/* SELECT PLAYER */
.voter-select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);margin-bottom:1rem;}
.voter-select:focus{outline:none;border-color:var(--s);}

/* RESULTS INDIVIDUAL */
.res-header{text-align:center;padding:1rem 0 .5rem;}
.res-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;margin:0 auto .75rem;}
.res-title{font-size:17px;font-weight:600;margin-bottom:3px;}
.res-sub{font-size:13px;color:var(--text2);}
.score-bars{display:flex;flex-direction:column;gap:10px;margin:1rem 0;}
.srow{display:flex;align-items:center;gap:8px;}
.slabel{width:90px;font-size:12px;font-weight:500;}
.strack{flex:1;height:9px;background:var(--bg2);border-radius:5px;overflow:hidden;}
.sfill{height:100%;border-radius:5px;transition:width .8s ease;}
.spct{width:32px;font-size:12px;text-align:right;color:var(--text2);}
.pcard{background:var(--bg2);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;}
.pcard h3{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text);}
.pcard p{font-size:13px;color:var(--text2);line-height:1.6;}
.traits{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.75rem;}
.tpill{border-radius:20px;padding:7px 8px;font-size:11px;text-align:center;line-height:1.3;font-weight:500;}
.dtabs{display:flex;gap:5px;margin-bottom:.75rem;overflow-x:auto;}
.dtab{flex:1;min-width:52px;padding:7px 3px;border:1px solid var(--border);background:var(--bg2);border-radius:var(--radius-sm);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;color:var(--text2);}
.dtab.active{border-width:2px;}
.dpanel{display:none;}.dpanel.active{display:block;}

/* VOTING */
.vcard{background:var(--bg2);border-radius:var(--radius);padding:1rem;margin-bottom:.875rem;}
.vcard-name{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text);}
.color-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.copt{padding:9px 7px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:center;transition:all .15s;background:var(--bg);}
.copt:hover{border-color:var(--border2);}
.copt.sel{transform:none;}
.copt .cletter{font-size:18px;font-weight:600;display:block;margin-bottom:2px;}
.copt .cname{font-size:11px;font-weight:600;display:block;}
.copt .cdesc{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.3;display:block;}
.vote-prog{font-size:12px;color:var(--text2);text-align:center;margin-bottom:1rem;background:var(--bg2);padding:7px;border-radius:var(--radius-sm);}

/* TEAM RESULTS */
.tpc{background:var(--bg2);border-radius:var(--radius);padding:.875rem;margin-bottom:.75rem;}
.tpc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tpc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0;}
.tpc-name{font-size:14px;font-weight:600;color:var(--text);}
.tpc-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block;margin-top:2px;}
.mini-bars{display:flex;flex-direction:column;gap:5px;}
.mrow{display:flex;align-items:center;gap:6px;}
.mlabel{width:72px;font-size:11px;font-weight:500;}
.mtrack{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.mfill{height:100%;border-radius:3px;}
.mpct{width:28px;font-size:10px;text-align:right;color:var(--text2);}
.votes-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.votes-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.vote-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.vchip{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;}
.match-note{font-size:11px;margin-top:4px;}
.team-dist{margin-top:.75rem;}
.dist-grid{display:flex;gap:7px;margin-top:7px;}
.dist-cell{flex:1;border-radius:var(--radius-sm);padding:9px 6px;text-align:center;}
.dist-cell .dc-letter{font-size:18px;font-weight:600;}
.dist-cell .dc-count{font-size:12px;margin-top:2px;}
.section-scroll{overflow-y:auto;flex:1;}

.sync-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 12px;border-radius:20px;background:var(--sl);color:var(--s);font-weight:500;margin-bottom:1rem;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--s);animation:p 1.5s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--s);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.on{opacity:1;}

</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db = getFirestore(initializeApp({
  apiKey:"AIzaSyDv_97PiTPAzdVqvykuYjSM49JgjK2XrH0",
  authDomain:"disc-veteranas-santfeliu.firebaseapp.com",
  projectId:"disc-veteranas-santfeliu",
  storageBucket:"disc-veteranas-santfeliu.firebasestorage.app",
  messagingSenderId:"500713360539",
  appId:"1:500713360539:web:1c4e2adb71756a2f4c4a3e"
}));
window.FB={
  savePlayers: async(names)=>{ try{await setDoc(doc(db,"config","equipo"),{players:names});return true;}catch(e){return false;} },
  loadPlayers: async()=>{ try{const s=await getDoc(doc(db,"config","equipo"));return s.exists()?s.data().players:null;}catch(e){return null;} },
  saveResult: async(name,scores,primary)=>{ try{await setDoc(doc(db,"resultados",name),{selfScores:scores,selfPrimary:primary});return true;}catch(e){return false;} },
  saveVotes: async(voter,votes)=>{ try{await setDoc(doc(db,"votos",voter),{votes});return true;}catch(e){return false;} },
  loadAll: async()=>{
    try{
      const [rs,vs]=await Promise.all([getDocs(collection(db,"resultados")),getDocs(collection(db,"votos"))]);
      const results={},votes={};
      rs.forEach(d=>results[d.id]=d.data());
      vs.forEach(d=>votes[d.id]=d.data().votes);
      return {results,votes};
    }catch(e){return {results:{},votes:{}};}
  },
  subscribe: (cb)=>{
    const u1=onSnapshot(collection(db,"resultados"),cb);
    const u2=onSnapshot(collection(db,"votos"),cb);
    return ()=>{u1();u2();};
  }
};
window._fbReady=true;
document.dispatchEvent(new Event('fbReady'));
<\/script>

</head>
<body>
<div id="app">

<div class="overlay" id="ov"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Conectando...</div></div>
<div class="toast" id="tst"></div>


<!-- WELCOME -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-hero">
    <div class="club-badge">⚽</div>
    <div class="disc-logo">
      <div class="dl d">D</div><div class="dl i">I</div>
      <div class="dl s">S</div><div class="dl c">C</div>
    </div>
    <div class="welcome-title">Test DISC · Veteranas</div>
    <div class="welcome-club">⚽ Peña Recreativa Sant Feliu de Llobregat</div>
    <div class="welcome-sub">Dos módulos: haz tu propio test DISC y después votad qué color veis en cada compañera.</div>
    <div class="info-cards">
      <div class="ic"><div class="n">60</div><div class="l">preguntas</div></div>
      <div class="ic"><div class="n">4</div><div class="l">colores DISC</div></div>
      <div class="ic"><div class="n">14</div><div class="l">jugadoras</div></div>
      <div class="ic"><div class="n">2</div><div class="l">módulos</div></div>
    </div>
    <div class="sync-pill"><span class="pulse"></span>Datos compartidos en tiempo real</div>
    <div class="info-cards" style="margin-bottom:.75rem">
      <div class="ic"><div class="n" id="stat-total">—</div><div class="l">jugadoras</div></div>
      <div class="ic"><div class="n" id="stat-done">—</div><div class="l">test completados</div></div>
    </div>
    <button class="btn-g" onclick="goSelectPlayer()">🧍 Hacer mi test DISC</button>
    <button class="btn-sec" onclick="goVotingSetup()">🗳️ Votar a las compañeras</button>
    <button class="btn-sec" style="font-size:12px;color:var(--text3)" onclick="goAdmin()">🔐 Acceso administradora</button>
  </div>
</div>

<!-- SETUP EQUIPO -->
<div id="screen-setup" class="screen">
  <div class="sec-title">⚙️ Configura el equipo</div>
  <div class="sec-sub">Escribe los nombres de todas las jugadoras.</div>
  <div class="player-list" id="player-list"></div>
  <button class="btn-add-p" onclick="addPlayer()">+ Añadir jugadora</button>
  <button class="btn-g" onclick="saveTeam()">Guardar equipo →</button>
  <button class="btn-sec" style="margin-top:6px" onclick="showScr('welcome')">← Volver</button>
</div>

<!-- SELECCIÓN JUGADORA PARA TEST -->
<div id="screen-select-player" class="screen">
  <div class="sec-title">🧍 ¿Quién hace el test?</div>
  <div class="sec-sub">Elige tu nombre para que el resultado se guarde en el equipo.</div>
  <select class="voter-select" id="test-player-select">
    <option value="">— Selecciona tu nombre —</option>
  </select>
  <button class="btn-g" onclick="startAsPlayer()">Empezar el test →</button>
  <button class="btn-sec" style="margin-top:6px" onclick="showScr('welcome')">← Volver</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
  <div class="quiz-meta">
    <span class="quiz-counter" id="qcounter">1 / 60</span>
    <span class="badge" id="sbadge"></span>
  </div>
  <div class="qcard">
    <div class="qemoji" id="qemoji"></div>
    <div class="qtext" id="qtext"></div>
  </div>
  <div class="opts-lbl">¿Con cuál te identificas más?</div>
  <div class="opts" id="opts"></div>
  <div class="nav-row">
    <button class="btn-back" id="btn-back" onclick="prevQ()">←</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>Siguiente</button>
  </div>
</div>

<!-- RESULTADO INDIVIDUAL -->
<div id="screen-result" class="screen">
  <div class="section-scroll">
    <div id="res-header" class="res-header"></div>
    <div class="score-bars" id="res-bars"></div>
    <div class="dtabs" id="dtabs"></div>
    <div id="dpanels"></div>
    <div style="display:flex;gap:8px;margin-top:.75rem;">
      <button class="btn-g" style="margin-bottom:0" onclick="goVotingSetup()">🗳️ Votar compañeras</button>
      <button class="btn-sec" style="flex:1" onclick="goTeamResults()">📊 Equipo</button>
    </div>
    <button class="btn-sec" style="margin-top:8px" onclick="showScr('welcome')">← Inicio</button>
  </div>
</div>

<!-- VOTING SETUP -->
<div id="screen-voting-setup" class="screen">
  <div class="sec-title">🗳️ Votar a las compañeras</div>
  <div class="sec-sub">¿Quién eres tú? Así sabemos quién vota.</div>
  <select class="voter-select" id="voter-select">
    <option value="">— Selecciona tu nombre —</option>
  </select>
  <button class="btn-g" onclick="startVoting()">Empezar a votar →</button>
  <button class="btn-sec" style="margin-top:6px" onclick="showScr('welcome')">← Volver</button>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen">
  <div style="text-align:center;padding:2rem 0 1rem">
    <div style="font-size:48px;margin-bottom:1rem">🔐</div>
    <div class="sec-title">Acceso administradora</div>
    <div class="sec-sub" style="margin-bottom:1.5rem">Solo para la coordinadora del equipo</div>
    <input type="password" id="admin-pwd" class="player-input" placeholder="Contraseña" style="margin-bottom:1rem;text-align:center;font-size:18px;letter-spacing:4px"
      onkeydown="if(event.key==='Enter')checkAdmin()">
    <button class="btn-g" onclick="checkAdmin()">Entrar →</button>
    <button class="btn-sec" style="margin-top:6px" onclick="showScr('welcome')">← Volver</button>
  </div>
</div>

<!-- VOTING -->

<div id="screen-voting" class="screen">
  <div class="sec-title">🗳️ ¿Qué color ves en cada compañera?</div>
  <div class="sec-sub" id="voter-label"></div>
  <div class="vote-prog" id="vote-prog"></div>
  <div class="section-scroll" id="voting-cards"></div>
  <button class="btn-g" id="btn-save-votes" onclick="saveVotesAndShow()" disabled style="margin-top:.75rem">Guardar mis votos →</button>
  <button class="btn-sec" style="margin-top:6px" onclick="goTeamResults()">Ver resultados sin guardar</button>
</div>

<!-- THANKS -->
<div id="screen-thanks" class="screen">
  <div style="text-align:center;padding:3rem 0">
    <div style="font-size:56px;margin-bottom:1rem">🎉</div>
    <div class="sec-title" style="font-size:20px;margin-bottom:.5rem">¡Todo guardado!</div>
    <div class="sec-sub" style="margin-bottom:2rem">Tu test y tus votos están guardados.<br>Los resultados del equipo se revelarán en la cena. ¡Hasta entonces es secreto!</div>
    <div style="font-size:40px;margin-bottom:1.5rem">⚽</div>
    <div style="font-size:13px;color:var(--text2);background:var(--sl);color:var(--s);padding:10px 16px;border-radius:var(--radius);font-weight:500">Peña Recreativa Sant Feliu de Llobregat</div>
  </div>
  <button class="btn-sec" onclick="showScr('welcome')">← Volver al inicio</button>
</div>

<!-- TEAM RESULTS -->

<div id="screen-team-results" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div class="sec-title" style="margin-bottom:0">📊 Perfil del equipo</div>
    <button onclick="goTeamResults()" style="border:none;background:none;cursor:pointer;font-size:20px" title="Actualizar">🔄</button>
  </div>
  <div class="sec-sub">Autoperfil vs. cómo os ven las compañeras</div>
  <div class="section-scroll" id="team-content"></div>
  <button class="btn-sec" style="margin-top:.75rem" onclick="showScr('welcome')">← Inicio</button>
  <button class="btn-sec" style="margin-top:6px;font-size:12px;color:var(--text3)" onclick="isAdmin=false;showScr('welcome')">🔒 Cerrar sesión admin</button>
</div>

</div>
<script>
const DISC=['D','I','S','C'];
const COLORS={D:'#E24B4A',I:'#EF9F27',S:'#1D9E75',C:'#378ADD'};
const LIGHTS={D:'#FCEBEB',I:'#FAEEDA',S:'#E1F5EE',C:'#E6F1FB'};
const MIDS={D:'#F09595',I:'#FAC775',S:'#9FE1CB',C:'#85B7EB'};
const NAMES={D:'Dominante',I:'Influyente',S:'Estable',C:'Concienzuda'};
const ICONS={D:'🔴',I:'🟡',S:'🟢',C:'🔵'};

// ==================== STATE ====================
let players=[];
let teamVotes={};
let currentVoter=null;
let cur=0,ans=new Array(60).fill(null),currentPlayer=null;

// ==================== SCREENS ====================
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ==================== SETUP ====================
function goSelectPlayer(){
  if(players.length===0){goSetup();return;}
  populateSelects();
  showScr('select-player');
}

function goSetup(){
  if(players.length===0){
    players=['Laura','Marta','Ana','Carla','Sofia','Elena','Paula','Nuria','Lucia','Sara','Maria','Claudia','Irene','Rosa']
      .map(n=>({name:n,selfScores:null,selfPrimary:null}));
  }
  renderPList();showScr('setup');
}

function renderPList(){
  document.getElementById('player-list').innerHTML=players.map((p,i)=>`
    <div class="player-row">
      <span class="player-num">${i+1}</span>
      <input class="player-input" value="${p.name}" oninput="players[${i}].name=this.value" placeholder="Nombre jugadora">
      ${players.length>2?`<button class="btn-del" onclick="removeP(${i})">×</button>`:'<div style="width:32px"></div>'}
    </div>
  `).join('');
}

function addPlayer(){
  if(players.length<20){players.push({name:'',selfScores:null,selfPrimary:null});renderPList();}
}
function removeP(i){players.splice(i,1);renderPList();}

function saveTeam(){
  players=players.filter(p=>p.name.trim()!=='');
  if(players.length<2){alert('Añade al menos 2 jugadoras.');return;}
  populateSelects();
  showScr('select-player');
}

function populateSelects(){
  ['test-player-select','voter-select'].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">— Selecciona tu nombre —</option>'+
      players.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
  });
}

function startAsPlayer(){
  const v=document.getElementById('test-player-select').value;
  if(!v){alert('Selecciona tu nombre.');return;}
  currentPlayer=v;cur=0;ans=new Array(60).fill(null);
  renderQ();showScr('quiz');
}

// ==================== QUIZ ====================
const SDATA={D:{name:'Dominante',color:'#E24B4A',bg:'#FCEBEB'},I:{name:'Influyente',color:'#EF9F27',bg:'#FAEEDA'},S:{name:'Estable',color:'#1D9E75',bg:'#E1F5EE'},C:{name:'Concienzuda',color:'#378ADD',bg:'#E6F1FB'}};

function renderQ(){
  const q=questions[cur];const sec=SDATA[q.s];
  const pct=((cur+1)/60)*100;
  document.getElementById('pfill').style.cssText=`width:${pct}%;background:${sec.color}`;
  document.getElementById('qcounter').textContent=(cur+1)+' / 60';
  const b=document.getElementById('sbadge');
  b.textContent=sec.name;b.style.background=sec.bg;b.style.color=sec.color;
  document.getElementById('qemoji').textContent=q.e;
  document.getElementById('qtext').textContent=q.t;
  const g=document.getElementById('opts');g.innerHTML='';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const btn=document.createElement('button');btn.className='obt';
    btn.innerHTML=`<div class="ot"><strong>${lbl}.</strong> ${q.opts[i].t}</div>`;
    if(ans[cur]===i){btn.classList.add('sel');btn.style.borderColor=sec.color;btn.style.background=sec.bg;}
    btn.onclick=()=>selOpt(i);g.appendChild(btn);
  });
  const bn=document.getElementById('btn-next');
  bn.disabled=ans[cur]===null;
  bn.textContent=cur===59?'¡Ver mi perfil!':'Siguiente →';
  document.getElementById('btn-back').style.visibility=cur===0?'hidden':'visible';
}

function selOpt(i){
  ans[cur]=i;const q=questions[cur];const sec=SDATA[q.s];
  document.querySelectorAll('.obt').forEach((b,idx)=>{
    b.classList.remove('sel');b.style.borderColor='';b.style.background='';
    if(idx===i){b.classList.add('sel');b.style.borderColor=sec.color;b.style.background=sec.bg;}
  });
  document.getElementById('btn-next').disabled=false;
}
function nextQ(){if(ans[cur]===null)return;if(cur===59){showIndResult();return;}cur++;renderQ();}
function prevQ(){if(cur===0)return;cur--;renderQ();}

// ==================== INDIVIDUAL RESULT ====================
function calcSc(){
  const sc={D:0,I:0,S:0,C:0};
  questions.forEach((q,qi)=>{if(ans[qi]!==null){const w=q.opts[ans[qi]].w;DISC.forEach(d=>sc[d]+=w[d]);}});
  return sc;
}

async function showIndResult(){
  const sc=calcSc();
  const total=DISC.reduce((s,d)=>s+sc[d],0);
  const pcts={};DISC.forEach(d=>pcts[d]=total>0?Math.round(sc[d]/total*100):0);
  const primary=DISC.reduce((a,b)=>sc[a]>=sc[b]?a:b);
  if(currentPlayer){
    ov(true);
    await window.FB.saveResult(currentPlayer,sc,primary);
    ov(false);
    toast('Resultado guardado para el equipo');
    const p=players.find(pp=>pp.name===currentPlayer);
    if(p){p.selfScores=sc;p.selfPrimary=primary;}
    updStats();
  }
  const prof=PROFILES[primary];
  document.getElementById('res-header').innerHTML=`
    <div class="res-circle" style="background:${LIGHTS[primary]};color:${COLORS[primary]};border:2px solid ${MIDS[primary]}">${primary}</div>
    <div class="res-title" style="color:${COLORS[primary]}">${prof.title}</div>
    <div class="res-sub">${prof.tagline}</div>
    <div style="margin-top:7px;font-size:11px;font-weight:500;background:${LIGHTS[primary]};color:${COLORS[primary]};padding:3px 12px;border-radius:20px;display:inline-block">Posición ideal: ${prof.position}</div>
  `;
  document.getElementById('res-bars').innerHTML=DISC.map(d=>`
    <div class="srow">
      <div class="slabel" style="color:${COLORS[d]}">${ICONS[d]} ${NAMES[d]}</div>
      <div class="strack"><div class="sfill" id="sf-${d}" style="width:0%;background:${COLORS[d]}"></div></div>
      <div class="spct">${pcts[d]}%</div>
    </div>
  `).join('');
  setTimeout(()=>DISC.forEach(d=>{const el=document.getElementById('sf-'+d);if(el)el.style.width=pcts[d]+'%';}),100);

  const tabs=[{id:'ov',l:'Perfil'},{id:'st',l:'Fortalezas'},{id:'gr',l:'Mejora'},{id:'co',l:'Compañeras'}];
  document.getElementById('dtabs').innerHTML=tabs.map((t,i)=>`
    <button class="dtab ${i===0?'active':''}" style="${i===0?`border-color:${COLORS[primary]};color:${COLORS[primary]};`:''}"
      onclick="swTab('${t.id}','${primary}',this)">${t.l}</button>
  `).join('');
  document.getElementById('dpanels').innerHTML=`
    <div id="p-ov" class="dpanel active">
      <div class="pcard"><h3>Tu perfil en el equipo</h3><p>${prof.description}</p></div>
      <div class="pcard"><h3>Qué te motiva</h3><p>${prof.motivation}</p></div>
      <div class="pcard"><h3>Tu mayor reto</h3><p>${prof.fear}</p></div>
    </div>
    <div id="p-st" class="dpanel">
      <div class="traits">${prof.strengths.map(s=>`<div class="tpill" style="background:${LIGHTS[primary]};color:${COLORS[primary]}">${s}</div>`).join('')}</div>
      <div class="pcard"><h3>Posición ideal</h3><p>${prof.position}</p></div>
    </div>
    <div id="p-gr" class="dpanel">
      <div class="pcard"><h3>Áreas de crecimiento</h3>${prof.growth.map(g=>`<p style="margin-bottom:5px">• ${g}</p>`).join('')}</div>
    </div>
    <div id="p-co" class="dpanel">
      <div class="pcard"><h3>Cómo comunicarte con cada compañera</h3>
        ${DISC.filter(d=>d!==primary).map(d=>`<p style="margin-bottom:9px"><strong style="color:${COLORS[d]}">${ICONS[d]} ${NAMES[d]}:</strong><br><span style="font-size:12px">${getTip(primary,d)}</span></p>`).join('')}
      </div>
      <div class="pcard"><h3>Cómo comunicarse contigo</h3><p>${prof.communication}</p></div>
    </div>
  `;
  showScr('result');
}

function swTab(id,primary,el){
  document.querySelectorAll('.dtab').forEach(b=>{b.classList.remove('active');b.style.borderColor='';b.style.color='';});
  el.classList.add('active');el.style.borderColor=COLORS[primary];el.style.color=COLORS[primary];
  document.querySelectorAll('.dpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
}

// ==================== VOTING ====================
function goVotingSetup(){
  if(players.length===0){alert('Primero configura el equipo desde el menú principal.');return;}
  populateSelects();
  if(currentPlayer)document.getElementById('voter-select').value=currentPlayer;
  showScr('voting-setup');
}

function startVoting(){
  const voter=document.getElementById('voter-select').value;
  if(!voter){alert('Selecciona tu nombre.');return;}
  const others=players.filter(p=>p.name!==voter);
  if(others.length===0){alert('No hay otras jugadoras para votar.');return;}
  if(!teamVotes[voter])teamVotes[voter]={};
  currentVoter=voter;
  document.getElementById('voter-label').textContent=`Hola ${voter} — elige el color DISC que mejor describe a cada compañera.`;
  renderVCards(voter,others);
  updateVProg(voter,others);
  showScr('voting');
}

function renderVCards(voter,others){
  document.getElementById('voting-cards').innerHTML=others.map(p=>`
    <div class="vcard">
      <div class="vcard-name">👤 ${p.name}${p.selfPrimary?` <span style="font-size:11px;font-weight:400;color:${COLORS[p.selfPrimary]}">· Autoperfil: ${p.selfPrimary}</span>`:''}</div>
      <div class="color-opts">
        ${DISC.map(d=>{
          const sel=teamVotes[voter][p.name]===d;
          return `<div class="copt ${sel?'sel':''}" id="co-${esc(p.name)}-${d}"
            style="${sel?`border-color:${COLORS[d]};background:${LIGHTS[d]};`:''}"
            onclick="castV('${voter}','${p.name}','${d}')">
            <span class="cletter" style="color:${COLORS[d]}">${d}</span>
            <span class="cname" style="color:${COLORS[d]}">${NAMES[d]}</span>
            <span class="cdesc">${DESCS[d]}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function esc(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

function castV(voter,target,disc){
  if(!teamVotes[voter])teamVotes[voter]={};
  teamVotes[voter][target]=disc;
  const others=players.filter(p=>p.name!==voter);
  DISC.forEach(d=>{
    const el=document.getElementById('co-'+esc(target)+'-'+d);
    if(!el)return;
    el.classList.remove('sel');el.style.borderColor='';el.style.background='';
    if(d===disc){el.classList.add('sel');el.style.borderColor=COLORS[d];el.style.background=LIGHTS[d];}
  });
  updateVProg(voter,others);
}

function updateVProg(voter,others){
  const voted=others.filter(p=>teamVotes[voter]&&teamVotes[voter][p.name]).length;
  document.getElementById('vote-prog').textContent=`Has votado ${voted} de ${others.length} compañeras`;
  document.getElementById('btn-save-votes').disabled=voted<others.length;
}

async function saveVotesAndShow(){
  if(currentVoter){
    ov(true);
    await window.FB.saveVotes(currentVoter,teamVotes[currentVoter]);
    ov(false);
    toast('Votos guardados');
    await fbRefresh();
  }
  showScr('thanks');
}
async function goTeamResults(){
  if(!isAdmin){goAdmin();return;}
  ov(true);await fbRefresh();ov(false);
  renderTeamContent();showScr('team-results');
}

// ==================== TEAM RESULTS ====================
function renderTeamContent(){
  const c=document.getElementById('team-content');
  if(players.length===0){c.innerHTML='<div class="pcard"><p>Primero configura el equipo.</p></div>';return;}
  let html='';
  players.forEach(p=>{
    const recv={D:0,I:0,S:0,C:0};let tv=0;
    Object.entries(teamVotes).forEach(([vtr,vs])=>{if(vtr!==p.name&&vs[p.name]){recv[vs[p.name]]++;tv++;}});
    const vPri=tv>0?DISC.reduce((a,b)=>recv[a]>=recv[b]?a:b):null;
    const hasSelf=!!p.selfPrimary;
    let sp=null;
    if(hasSelf&&p.selfScores){
      const tot=DISC.reduce((s,d)=>s+p.selfScores[d],0)||1;
      sp={};DISC.forEach(d=>sp[d]=Math.round(p.selfScores[d]/tot*100));
    }
    html+=`<div class="tpc">
      <div class="tpc-header">
        <div class="tpc-avatar" style="background:${hasSelf?LIGHTS[p.selfPrimary]:'#f5f5f7'};color:${hasSelf?COLORS[p.selfPrimary]:'#aeaeb2'}">${hasSelf?p.selfPrimary:'?'}</div>
        <div>
          <div class="tpc-name">${p.name}</div>
          ${hasSelf?`<span class="tpc-badge" style="background:${LIGHTS[p.selfPrimary]};color:${COLORS[p.selfPrimary]}">Autoperfil: ${NAMES[p.selfPrimary]}</span>`:`<span class="tpc-badge" style="background:#f5f5f7;color:#aeaeb2">Sin test</span>`}
        </div>
      </div>`;
    if(sp){
      html+=`<div class="mini-bars">${DISC.map(d=>`
        <div class="mrow">
          <div class="mlabel" style="color:${COLORS[d]}">${ICONS[d]} ${NAMES[d]}</div>
          <div class="mtrack"><div class="mfill" style="width:${sp[d]}%;background:${COLORS[d]}"></div></div>
          <div class="mpct">${sp[d]}%</div>
        </div>`).join('')}</div>`;
    }
    if(tv>0){
      html+=`<div class="votes-section">
        <div class="votes-label">🗳️ Cómo la ven las compañeras (${tv} voto${tv>1?'s':''})</div>
        <div class="vote-chips">${DISC.map(d=>recv[d]>0?`<span class="vchip" style="background:${LIGHTS[d]};color:${COLORS[d]}">${ICONS[d]} ${recv[d]} voto${recv[d]>1?'s':''}</span>`:'').join('')}</div>
        ${vPri?`<div style="font-size:12px;color:${COLORS[vPri]};font-weight:600">Percepción del equipo: ${NAMES[vPri]}</div>`:''}
        ${hasSelf&&vPri&&p.selfPrimary!==vPri?`<div class="match-note" style="color:#6e6e73">💡 Ella se ve como <strong style="color:${COLORS[p.selfPrimary]}">${NAMES[p.selfPrimary]}</strong>, el equipo la ve <strong style="color:${COLORS[vPri]}">${NAMES[vPri]}</strong></div>`:''}
        ${hasSelf&&vPri&&p.selfPrimary===vPri?`<div class="match-note" style="color:${COLORS[vPri]}">✅ Autoperfil y percepción del equipo coinciden</div>`:''}
      </div>`;
    }else{
      html+=`<div style="margin-top:8px;font-size:12px;color:#aeaeb2">Aún no hay votos de las compañeras</div>`;
    }
    html+=`</div>`;
  });

  // Team distribution
  const withSelf=players.filter(p=>p.selfPrimary);
  if(withSelf.length>0){
    const dist={D:0,I:0,S:0,C:0};
    withSelf.forEach(p=>dist[p.selfPrimary]++);
    html+=`<div class="pcard">
      <h3>🏟️ Distribución del equipo</h3>
      <div class="dist-grid">${DISC.filter(d=>dist[d]>0).map(d=>`
        <div class="dist-cell" style="background:${LIGHTS[d]}">
          <div class="dc-letter" style="color:${COLORS[d]}">${d}</div>
          <div class="dc-count" style="color:${COLORS[d]}">${dist[d]} jug.</div>
        </div>`).join('')}</div>
    </div>`;
  }
  c.innerHTML=html;
}

function getTip(f,t){
  const tips={'D-I':'Dale contexto emocional y celebra sus ideas. Necesita sentir que la escuchas.','D-S':'Baja la intensidad. Escúchala de verdad antes de proponer soluciones.','D-C':'Trae datos y razones claras. No esperes que actúe sin entender el porqué.','I-D':'Ve al grano y muéstrale el impacto concreto. Objetivo, acción, resultado.','I-S':'Sé constante y dale tiempo. Valora su lealtad; no necesita espectáculo, sino presencia.','I-C':'Sé más precisa y estructura tus ideas. Respeta su necesidad de analizar.','S-D':'Sé más directa y habla de lo que quieres. No esperes a que lo adivine.','S-I':'Participa más activamente. Tu aportación vale mucho aunque no la impongas.','S-C':'Dale tiempo y datos. No la presiones a decidir sin la información que necesita.','C-D':'Comunica con más rapidez. Ella quiere acción, no análisis interminable.','C-I':'Sé más expresiva y espontánea. Celebra con ella y comparte tus emociones.','C-S':'Cuida el vínculo humano. Pregúntale cómo está antes de hablar de táctica.'};
  return tips[f+'-'+t]||'Adapta tu ritmo y estilo a sus necesidades.';
}
